<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <script src="https://cdn.tailwindcss.com"></script>
        
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

        <title>{% block title %}
            {% endblock %}</title>

        <style>
            .vertical-text {
                writing-mode: vertical-rl;
                transform: rotate(180deg);
            }
        </style>
    </head>
    <body>
        <nav class="bg-white dark:bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-200 dark:border-gray-600">
            <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
                <a href="" class="flex items-center space-x-3 rtl:space-x-reverse">
                    <img src="https://images.vexels.com/content/229082/preview/book-circles-logo-82dff4.png" class="h-8">
                    <span class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white">B-Commerce</span>
                </a>
                <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
                    {% if request.user.is_authenticated %}
                        <button onclick="location.href='{% url 'comunicacion:bandeja' %}'" type="button" class="text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2">Mensajes</button>
                        <button onclick="location.href='{% url 'panel:index' %}'" type="button" class="text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-green-300 dark:focus:ring-green-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2">Panel</button>
                    {% else %}
                        <button onclick="location.href='{% url 'core:crearcuenta' %}'" type="button" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 mr-4">Crear Perfil</button>
                        <button onclick="location.href='{% url 'core:login' %}'" type="button" class="text-white bg-red-700 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800">Login</button>
                    {% endif %}
                </div>
                <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-sticky">
                    <ul class="flex flex-col p-4 md:p-0 mt-4 font-medium border border-gray-100 rounded-lg bg-gray-50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-white dark:bg-gray-800 md:dark:bg-gray-900 dark:border-gray-700">
                        <li>
                            <a href="{% url 'libro:nuevo' %}" class="block py-2 px-3 text-white bg-blue-700 rounded md:bg-transparent md:text-blue-700 md:p-0 md:dark:text-blue-500" aria-current="page">Nuevo Libro</a>
                        </li>
                        <li>
                            <a href="{% url 'libro:libros' %}" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-700 md:p-0 md:dark:hover:text-blue-500 dark:text-white dark:hover:bg-gray-700 dark:hover:text-white md:dark:hover:bg-transparent dark:border-gray-700">Buscar</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="pt-20 px-6 py-6">
            {% block content %}
            {% endblock %}
        </div>

        <footer class="relative bg-white rounded-lg shadow dark:bg-gray-900 w-full fixed bottom-0 left-0">
            <div class="w-full max-w-screen-xl mx-auto p-4 md:py-8 flex justify-center">
                <a class="flex items-center space-x-3 rtl:space-x-reverse">
                    <img src="https://images.vexels.com/content/229082/preview/book-circles-logo-82dff4.png" class="h-8">
                    <span class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white">B-Commerce</span>
                </a>
            </div>
            <hr class="border-gray-200 dark:border-gray-700 w-full mx-auto" />
        </footer>
    </body>
</html>
